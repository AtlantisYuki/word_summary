<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>省流总结助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>省流总结助手</h1>
      <div class="actions">
        <button id="summary-selection">总结选中文本</button>
        <button id="summary-page">总结整页内容</button>
      </div>
      <p id="status" class="status"></p>
      <textarea id="result" class="result" placeholder="摘要结果会显示在这里" readonly></textarea>
      <div class="footer">
        <a href="#" id="open-options">打开设置</a>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
